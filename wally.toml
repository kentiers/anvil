[package]
name = "kentiers/anvil"
description = "Server-authoritative action, schema, and lifecycle foundation for Roblox"
version = "0.3.0"
registry = "https://github.com/UpliftGames/wally-index"
realm = "server"
license = "MIT"
authors = ["kentiers"]
repository = "https://github.com/kentiers/anvil"
exclude = [
    "AGENTS.md",
    "benchmarks",
    "build",
    "docs",
    "examples",
    "graphify-out",
    "scripts",
    "test",
    "tools",
    "DevPackages",
    "sourcemap.json",
    "testez.yml",
    "test.project.json",
    "rokit.toml",
    "selene.toml",
    ".stylua.toml",
    ".styluaignore",
    "wally.lock",
]

[dev-dependencies]
ByteNet = "ffrostflame/bytenet@0.4.6"
ProfileStore = "lm-loleris/profilestore@1.0.3"
Remo = "littensy/remo@1.5.3"
Scribe = "ericplane/scribe@1.0.7"
TestEZ = "roblox/testez@0.4.1"
Trove = "sleitnick/trove@1.8.0"
