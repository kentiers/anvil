[package]
name = "kentiers/anvil"
description = "Server-authoritative action, schema, and lifecycle foundation for Roblox"
version = "0.1.1"
registry = "https://github.com/UpliftGames/wally-index"
realm = "server"
license = "MIT"
authors = ["kentiers"]
repository = "https://github.com/kentiers/anvil"
exclude = [
    "AGENTS.md",
    "benchmarks",
    "build",
    "docs",
    "examples",
    "graphify-out",
    "scripts",
    "test",
    "tools",
    "DevPackages",
    "sourcemap.json",
    "testez.yml",
    "test.project.json",
    "rokit.toml",
    "selene.toml",
    ".stylua.toml",
    ".styluaignore",
    "wally.lock",
]

[dev-dependencies]
TestEZ = "roblox/testez@0.4.1"
